<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" fill="none">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#94A3B8"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .cardTitle { font: 700 16px Arial, sans-serif; fill: #0F172A; }
      .cardText { font: 400 13px Arial, sans-serif; fill: #334155; }
      .label { font: 600 12px Arial, sans-serif; fill: #475569; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="1200" height="320" rx="28" fill="#F8FAFC"/>
  <text x="56" y="58" class="title">FinancialModels Workflow</text>
  <text x="56" y="84" class="subtitle">From a short ask to a structured, memo-ready finance deliverable</text>

  <line x1="216" y1="182" x2="248" y2="182" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="408" y1="182" x2="440" y2="182" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="182" x2="632" y2="182" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="792" y1="182" x2="824" y2="182" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="984" y1="182" x2="1016" y2="182" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(56 118)">
    <text x="0" y="-18" class="label">STEP 1</text>
    <rect width="160" height="128" rx="20" fill="#E0F2FE"/>
    <text x="18" y="36" class="cardTitle">Short Ask</text>
    <text x="18" y="64" class="cardText">User starts with</text>
    <text x="18" y="84" class="cardText">a rough prompt such</text>
    <text x="18" y="104" class="cardText">as “Run a DCF”.</text>
  </g>

  <g transform="translate(248 118)">
    <text x="0" y="-18" class="label">STEP 2</text>
    <rect width="160" height="128" rx="20" fill="#DCFCE7"/>
    <text x="18" y="36" class="cardTitle">Quickstart</text>
    <text x="18" y="64" class="cardText">Catch natural-language</text>
    <text x="18" y="84" class="cardText">requests and respond</text>
    <text x="18" y="104" class="cardText">in plain Chinese.</text>
  </g>

  <g transform="translate(440 118)">
    <text x="0" y="-18" class="label">STEP 3</text>
    <rect width="160" height="128" rx="20" fill="#FEF3C7"/>
    <text x="18" y="36" class="cardTitle">Model Router</text>
    <text x="18" y="64" class="cardText">Identify which of</text>
    <text x="18" y="84" class="cardText">the 12 workflows</text>
    <text x="18" y="104" class="cardText">best fits the ask.</text>
  </g>

  <g transform="translate(632 118)">
    <text x="0" y="-18" class="label">STEP 4</text>
    <rect width="160" height="128" rx="20" fill="#FCE7F3"/>
    <text x="18" y="36" class="cardTitle">Input Check</text>
    <text x="18" y="64" class="cardText">Ask only for the</text>
    <text x="18" y="84" class="cardText">missing assumptions</text>
    <text x="18" y="104" class="cardText">and financial inputs.</text>
  </g>

  <g transform="translate(824 118)">
    <text x="0" y="-18" class="label">STEP 5</text>
    <rect width="160" height="128" rx="20" fill="#EDE9FE"/>
    <text x="18" y="36" class="cardTitle">Full Suite</text>
    <text x="18" y="64" class="cardText">Build the model,</text>
    <text x="18" y="84" class="cardText">frame the outputs,</text>
    <text x="18" y="104" class="cardText">and surface risks.</text>
  </g>

  <g transform="translate(1016 118)">
    <text x="0" y="-18" class="label">STEP 6</text>
    <rect width="128" height="128" rx="20" fill="#DBEAFE"/>
    <text x="18" y="36" class="cardTitle">Deliverable</text>
    <text x="18" y="64" class="cardText">Produce a more</text>
    <text x="18" y="84" class="cardText">polished banker-</text>
    <text x="18" y="104" class="cardText">style output.</text>
  </g>
</svg>
