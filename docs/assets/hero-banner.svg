<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="640" viewBox="0 0 1600 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1520" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE"/>
      <stop offset="0.5" stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10B981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <style>
      .title { font: 700 56px Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 24px Arial, sans-serif; fill: #334155; }
      .eyebrow { font: 700 15px Arial, sans-serif; letter-spacing: 0.12em; fill: #0369A1; }
      .cardTitle { font: 700 24px Arial, sans-serif; fill: white; }
      .cardText { font: 400 17px Arial, sans-serif; fill: rgba(255,255,255,0.9); }
      .pill { font: 700 15px Arial, sans-serif; fill: #0F172A; }
      .statTitle { font: 700 18px Arial, sans-serif; fill: #0F172A; }
      .statCopy { font: 400 15px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect x="24" y="24" width="1552" height="592" rx="36" fill="url(#bg)"/>
  <rect x="24" y="24" width="1552" height="592" rx="36" stroke="#E2E8F0"/>

  <text x="88" y="108" class="eyebrow">CODEX SKILLS FOR FINANCIAL MODELING</text>
  <text x="88" y="180" class="title">FinancialModels</text>
  <text x="88" y="224" class="subtitle">A compact documentation-ready repository for routing, intake, and polished finance deliverables.</text>

  <rect x="88" y="272" width="172" height="42" rx="21" fill="#FFFFFF"/>
  <text x="118" y="299" class="pill">12 workflows</text>
  <rect x="276" y="272" width="244" height="42" rx="21" fill="#FFFFFF"/>
  <text x="306" y="299" class="pill">Chinese banker-style output</text>
  <rect x="536" y="272" width="190" height="42" rx="21" fill="#FFFFFF"/>
  <text x="566" y="299" class="pill">Quickstart intake</text>

  <g transform="translate(900 92)">
    <rect width="252" height="180" rx="28" fill="url(#cardA)"/>
    <text x="28" y="48" class="cardTitle">Quickstart</text>
    <text x="28" y="82" class="cardText">Catch short asks</text>
    <text x="28" y="108" class="cardText">like “Run a DCF”</text>
    <text x="28" y="134" class="cardText">and ask for only</text>
    <text x="28" y="160" class="cardText">the missing inputs.</text>
  </g>

  <g transform="translate(1176 92)">
    <rect width="252" height="180" rx="28" fill="url(#cardB)"/>
    <text x="28" y="48" class="cardTitle">Suite Router</text>
    <text x="28" y="82" class="cardText">Map requests into</text>
    <text x="28" y="108" class="cardText">valuation, modeling,</text>
    <text x="28" y="134" class="cardText">risk, and committee</text>
    <text x="28" y="160" class="cardText">workflows.</text>
  </g>

  <g transform="translate(1038 296)">
    <rect width="252" height="180" rx="28" fill="url(#cardC)"/>
    <text x="28" y="48" class="cardTitle">Deliverables</text>
    <text x="28" y="82" class="cardText">Produce memo-ready</text>
    <text x="28" y="108" class="cardText">outputs with clear</text>
    <text x="28" y="134" class="cardText">assumptions, bridges,</text>
    <text x="28" y="160" class="cardText">and sensitivity tables.</text>
  </g>

  <g transform="translate(88 386)">
    <rect width="232" height="134" rx="24" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="24" y="44" class="statTitle">Installation-ready</text>
    <text x="24" y="74" class="statCopy">Copy both skill folders into</text>
    <text x="24" y="96" class="statCopy">your local Codex skills path</text>
  </g>

  <g transform="translate(344 386)">
    <rect width="232" height="134" rx="24" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="24" y="44" class="statTitle">Docs-ready</text>
    <text x="24" y="74" class="statCopy">Includes Markdown guides,</text>
    <text x="24" y="96" class="statCopy">SVG diagrams, and examples</text>
  </g>

  <g transform="translate(600 386)">
    <rect width="232" height="134" rx="24" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="24" y="44" class="statTitle">Pages-ready</text>
    <text x="24" y="74" class="statCopy">MkDocs config and a GitHub</text>
    <text x="24" y="96" class="statCopy">Pages deployment workflow</text>
  </g>
</svg>
